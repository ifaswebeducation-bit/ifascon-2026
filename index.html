                        ${hallBadge}
                        <span class="text-xs font-bold text-indigo-600 block mb-1">${ev.time}</span>
                        <h2 class="text-[17px] font-bold text-slate-800 leading-tight">${ev.title}</h2>
                        ${speakerHtml}
                    </div>
                `;
            } 
            else {
                let tagClass = "bg-slate-100 text-slate-600 border border-slate-200";
                if(ev.tag && ev.tag.toLowerCase().includes('lecture')) tagClass = "bg-blue-50 text-blue-600 border border-blue-100";
                else if(ev.tag && ev.tag.toLowerCase().includes('panel')) tagClass = "bg-purple-50 text-purple-600 border border-purple-100";
                else if(ev.tag && ev.tag.toLowerCase().includes('q&a') || ev.tag.toLowerCase().includes('discussion')) tagClass = "bg-orange-50 text-orange-600 border border-orange-100";

                let tagHtml = ev.tag ? `<span class="px-2 py-0.5 text-[10px] uppercase tracking-wider font-bold rounded flex-shrink-0 ${tagClass}">${ev.tag}</span>` : '';
                let speakerHtml = ev.speaker ? `<div class="mt-3 bg-slate-50 rounded-lg p-2 border border-slate-100 flex items-start"><i class="fas fa-microphone text-indigo-400 mt-0.5 mr-2 text-sm"></i><span class="text-[13px] font-bold text-indigo-900">${ev.speaker}</span></div>` : '';
                
                return `
                    <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-100 mb-3 relative overflow-hidden">
                        ${hallBadge}
                        ${parentSessionHtml}
                        <div class="flex justify-between items-start mb-2 gap-2">
                            <div class="text-xs font-bold text-slate-500 bg-slate-50 px-2 py-1 rounded border border-slate-100 inline-flex items-center whitespace-nowrap">
                                <i class="far fa-clock mr-1.5 text-slate-400"></i> ${ev.time}
                            </div>
                            ${tagHtml}
                        </div>
                        <h3 class="text-[15px] font-semibold text-slate-900 leading-snug">${ev.title}</h3>
                        ${speakerHtml}
                    </div>
                `;
            }
        }

        function showTab(tabKey) {
            currentTab = tabKey;
            searchInput.value = '';
            clearBtn.classList.add('hidden');
            downloadContainer.classList.add('hidden'); // Hide download on normal view
            
            // Update active state of buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + tabKey).classList.add('active');
            
            // Render specific day
            const data = appData[tabKey];
            container.innerHTML = `
                <div class="mb-5 flex items-center justify-between">
                    <h2 class="text-xl font-extrabold text-slate-800 tracking-tight">${data.title.split(' - ')[0]}</h2>
                    <span class="text-[10px] font-bold bg-indigo-100 text-indigo-700 px-2.5 py-1 rounded-full uppercase tracking-widest leading-tight text-right max-w-[50%]">${data.title.split(' - ')[1]}</span>
                </div>
            `;
            
            let eventsHtml = '';
            data.events.forEach(ev => {
                eventsHtml += renderEvent(ev, false);
            });
            container.innerHTML += eventsHtml;
            container.scrollTop = 0;
        }

        function performSearch(query) {
            if (!query) {
                downloadContainer.classList.add('hidden');
                showTab(currentTab);
                return;
            }
            
            // Remove active state from all tabs to indicate global search
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            container.innerHTML = `
                <div class="mb-5">
                    <h2 class="text-xl font-extrabold text-slate-800 tracking-tight">Search Results</h2>
                    <p class="text-sm text-slate-500 mt-1">Showing all commitments for "<span class="font-bold text-indigo-600">${query}</span>"</p>
                </div>
            `;
            
            let foundCount = 0;
            let resultsHtml = '';
            
            for (const [key, data] of Object.entries(appData)) {
                data.events.forEach(ev => {
                    if (ev.searchable.includes(query)) {
                        resultsHtml += renderEvent(ev, true); // true = show Hall badge
                        foundCount++;
                    }
                });
            }
            
            if (foundCount === 0) {
                downloadContainer.classList.add('hidden');
                container.innerHTML += `
                    <div class="text-center py-12 px-4">
                        <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-400">
                            <i class="fas fa-search text-2xl"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-slate-700">No results found</h3>
                        <p class="text-slate-500 text-sm mt-1">Check the spelling and try again.</p>
                    </div>
                `;
            } else {
                downloadContainer.classList.remove('hidden'); // Show download button
                container.innerHTML += resultsHtml;
            }
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (query.length > 0) clearBtn.classList.remove('hidden');
            else clearBtn.classList.add('hidden');
            
            performSearch(query);
        });

        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearBtn.classList.add('hidden');
            downloadContainer.classList.add('hidden');
            showTab(currentTab);
        });

        downloadBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (!query) return;

            let textContent = `IFASCON 2026 - Itinerary for: "${query}"\n`;
            textContent += `==========================================================\n\n`;

            for (const [key, data] of Object.entries(appData)) {
                data.events.forEach(ev => {
                    if (ev.searchable.includes(query.toLowerCase())) {
                        textContent += `Date / Location : ${data.title}\n`;
                        if (ev.parent_session) textContent += `Symposium     : ${ev.parent_session}\n`;
                        if (ev.time) textContent += `Time          : ${ev.time}\n`;
                        if (ev.title) textContent += `Topic         : ${ev.title}\n`;
                        if (ev.speaker) textContent += `Speaker/Chair : ${ev.speaker}\n`;
                        textContent += `----------------------------------------------------------\n\n`;
                    }
                });
            }

            const blob = new Blob([textContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `IFASCON_Itinerary_${query.replace(/\s+/g, '_')}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // Init
        showTab('ao');
    </script>
</body>
</html>
